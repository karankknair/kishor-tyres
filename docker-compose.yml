# Docker Compose for Local Production Testing
# Usage: docker-compose up --build

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kishor_tyres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/kishor_tyres
      SECRET_KEY: local-secret-key-change-in-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - media_files:/app/media

volumes:
  postgres_data:
  media_files:
